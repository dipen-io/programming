      <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderReadme(p) {
  const r = p.readme;
  const panel = document.getElementById('readme-panel');
  const body = document.getElementById('readme-body');
  const fname = document.getElementById('readme-filename');
  fname.textContent = `project-${String(p.id).padStart(2,'0')}-${p.title.toLowerCase().replace(/[^a-z0-9]+/g,'-')}/README.md`;
  
  const badge = `![${r.badges[0]}](https://img.shields.io/badge/level-${r.badges[0]}-${encodeURIComponent(tierColors[p.tier])}?style=flat-square)`;
  const badge2 = `![zig](https://img.shields.io/badge/zig-0.13-F7A41D?style=flat-square&logo=zig)`;

  const raw = `${r.title}

${badge} ${badge2}

## Overview
${r.overview}

## Concepts covered
${r.concepts.map(c => `- ${c}`).join('\n')}

## Project structure
\`\`\`
${r.structure}
\`\`\`

## Getting started
\`\`\`bash
${r.run}
\`\`\`

## Tasks
${r.tasks.map((t,i) => `${i+1}. ${t}`).join('\n')}

## Stretch challenge
> ${r.challenge}
`;

  body.innerHTML = raw
    .replace(/^(#{1}) (.+)$/m, '<span class="md-h1">$1 $2</span>')
    .replace(/^(#{2}) (.+)$/gm, '<span class="md-h2">$2</span>')
    .replace(/^(#{3}) (.+)$/gm, '<span class="md-h3">$2</span>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--color-background-tertiary);padding:1px 5px;border-radius:3px;">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/^> (.+)$/gm, '<em style="color:var(--color-text-secondary);">💡 $1</em>');

  panel.style.display = 'block';
  
  document.getElementById('copy-btn').onclick = () => {
    navigator.clipboard.writeText(raw).then(() => {
      document.getElementById('copy-btn').textContent = 'copied!';
      setTimeout(() => document.getElementById('copy-btn').textContent = 'copy raw', 1500);
    });
  };
}

function selectProject(id) {
  selectedId = id;
  const p = projects.find(x => x.id === id);
  renderGrid();
  renderReadme(p);
  document.getElementById('readme-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  currentTier = btn.dataset.tier;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
});

renderGrid();
</script>
